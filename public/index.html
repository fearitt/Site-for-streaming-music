<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStream</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }

.role-selector {
  display: flex; align-items: center; gap: 12px; padding: 16px 24px;
  background: #12121a; border-bottom: 1px solid #222; flex-wrap: wrap;
}
.role-selector span { color: #888; font-size: 14px; }
.role-btn {
  padding: 8px 20px; border: 1px solid #333; border-radius: 8px; cursor: pointer;
  font-size: 14px; background: transparent; color: #aaa; transition: all .2s;
}
.role-btn:hover { border-color: #555; color: #fff; }
.role-btn.active { border-color: #6c5ce7; color: #fff; background: #6c5ce722; }

.container { max-width: 800px; margin: 0 auto; padding: 24px; }

.upload-section {
  background: #12121a; border: 1px solid #222; border-radius: 12px;
  padding: 24px; margin-bottom: 24px;
}
.upload-section h3 { margin-bottom: 16px; font-size: 16px; color: #ccc; }
.upload-form { display: flex; flex-direction: column; gap: 12px; }
.upload-form input[type="text"] {
  padding: 10px 14px; border-radius: 8px; border: 1px solid #333;
  background: #1a1a25; color: #e0e0e0; font-size: 14px; outline: none;
}
.upload-form input[type="text"]:focus { border-color: #6c5ce7; }
.upload-form input[type="file"] { font-size: 14px; color: #888; }
.upload-btn {
  padding: 12px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 15px; font-weight: 500; background: #6c5ce7; color: #fff;
  transition: background .2s;
}
.upload-btn:hover { background: #5a4bd1; }
.upload-btn:disabled { opacity: .5; cursor: not-allowed; }

.tracks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.tracks-header h3 { font-size: 16px; color: #ccc; }
.track-count { color: #666; font-size: 13px; }

.track-list { display: flex; flex-direction: column; gap: 8px; }
.track-item {
  display: flex; align-items: center; gap: 14px;
  background: #12121a; border: 1px solid #222; border-radius: 10px;
  padding: 12px 16px; transition: border-color .2s;
}
.track-item:hover { border-color: #333; }
.track-item.playing { border-color: #6c5ce7; background: #6c5ce711; }

.track-info { flex: 1; min-width: 0; cursor: pointer; }
.track-title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-artist { font-size: 13px; color: #777; margin-top: 2px; }
.track-meta { font-size: 11px; color: #555; margin-top: 2px; }

.play-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
  background: transparent; color: #888; font-size: 16px; display: flex;
  align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0;
}
.play-btn:hover { background: #6c5ce722; color: #6c5ce7; }
.track-item.playing .play-btn { color: #6c5ce7; }

.delete-btn {
  padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer;
  background: #e74c3c22; color: #e74c3c; font-size: 13px; transition: all .2s; flex-shrink: 0;
}
.delete-btn:hover { background: #e74c3c44; }

.player-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #12121a; border-top: 1px solid #222; padding: 12px 24px;
  display: flex; align-items: center; gap: 16px;
}
.player-info { min-width: 150px; max-width: 250px; }
.player-info .track-title { font-size: 14px; }
.player-info .track-artist { font-size: 12px; }
.player-controls { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.player-buttons { display: flex; align-items: center; gap: 16px; }
.player-buttons button {
  background: none; border: none; color: #888; cursor: pointer;
  font-size: 20px; transition: color .2s;
}
.player-buttons button:hover { color: #fff; }
.player-buttons .main-play {
  width: 44px; height: 44px; border-radius: 50%; background: #6c5ce7;
  color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center;
}
.player-buttons .main-play:hover { background: #5a4bd1; }
.progress-container { width: 100%; max-width: 500px; display: flex; align-items: center; gap: 8px; }
.progress-container span { font-size: 12px; color: #666; min-width: 35px; }
.progress-bar {
  flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
  background: #222; border-radius: 2px; outline: none; cursor: pointer;
}
.progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #6c5ce7; cursor: pointer; }
.volume-control { display: flex; align-items: center; gap: 8px; }
.volume-control input { width: 80px; }

.empty-state { text-align: center; padding: 48px 24px; color: #555; }
.empty-state p { font-size: 18px; margin-bottom: 8px; }
.empty-state span { font-size: 14px; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="role-selector">
  <span>Режим:</span>
  <button class="role-btn" data-role="user">Пользователь</button>
  <button class="role-btn active" data-role="admin">Администратор</button>
  <span style="color:#555;font-size:13px;margin-left:8px" id="roleHint">Можно всё: добавлять и удалять треки</span>
</div>

<div class="container">
  <div class="upload-section">
    <h3>➕ Добавить трек</h3>
    <form class="upload-form" id="uploadForm">
      <input type="text" name="title" placeholder="Название трека (оставьте пустым для имени файла)">
      <input type="text" name="artist" placeholder="Исполнитель">
      <input type="file" name="audio" accept=".mp3,.wav,.flac,.ogg,.aac,.m4a,.wma" required>
      <button type="submit" class="upload-btn">Загрузить файл</button>
    </form>
  </div>

  <div class="upload-section" style="border-color:#6c5ce744;">
    <h3>🌐 Импорт по ссылке (YouTube и др.)</h3>
    <form class="upload-form" id="importForm">
      <input type="url" name="url" placeholder="https://youtube.com/watch?v=..." required>
      <button type="submit" class="upload-btn" style="background:#e17055;">Импортировать</button>
      <div style="font-size:13px;color:#666;margin-top:-4px">Скачивается через yt-dlp. Поддерживаются YouTube, SoundCloud и другие сайты.</div>
    </form>
  </div>

  <div class="tracks-header">
    <h3>🎵 Треки</h3>
    <span class="track-count" id="trackCount">0 треков</span>
  </div>

  <div class="track-list" id="trackList">
    <div class="empty-state">
      <p>🎵 Пока нет треков</p>
      <span>Загрузите свою музыку через форму выше</span>
    </div>
  </div>
</div>

<div class="player-bar" id="playerBar">
  <div class="player-info">
    <div class="track-title" id="nowPlayingTitle">Нет трека</div>
    <div class="track-artist" id="nowPlayingArtist"></div>
  </div>
  <div class="player-controls">
    <div class="player-buttons">
      <button id="prevBtn">⏮</button>
      <button class="main-play" id="playPauseBtn">▶</button>
      <button id="nextBtn">⏭</button>
    </div>
    <div class="progress-container">
      <span id="currentTime">0:00</span>
      <input type="range" class="progress-bar" id="progressBar" value="0" min="0" max="100">
      <span id="totalTime">0:00</span>
    </div>
  </div>
  <div class="volume-control">
    <span>🔊</span>
    <input type="range" id="volumeBar" value="80" min="0" max="100">
  </div>
</div>

<audio id="audioPlayer"></audio>

<script>
let currentRole = 'admin';
let tracks = [];
let currentTrackIndex = -1;
let isPlaying = false;

const audio = document.getElementById('audioPlayer');
const trackListEl = document.getElementById('trackList');
const trackCountEl = document.getElementById('trackCount');
const uploadForm = document.getElementById('uploadForm');
const roleHint = document.getElementById('roleHint');
const playPauseBtn = document.getElementById('playPauseBtn');
const progressBar = document.getElementById('progressBar');
const volumeBar = document.getElementById('volumeBar');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');
const nowPlayingTitle = document.getElementById('nowPlayingTitle');
const nowPlayingArtist = document.getElementById('nowPlayingArtist');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

document.querySelectorAll('.role-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRole = btn.dataset.role;
    roleHint.textContent = currentRole === 'admin'
      ? 'Можно всё: добавлять и удалять треки'
      : 'Только добавление треков (удаление недоступно)';
    renderTracks();
  });
});

async function loadTracks() {
  const res = await fetch('/api/tracks');
  tracks = await res.json();
  renderTracks();
}

function renderTracks() {
  if (tracks.length === 0) {
    trackListEl.innerHTML = `<div class="empty-state"><p>🎵 Пока нет треков</p><span>Загрузите свою музыку через форму выше</span></div>`;
    trackCountEl.textContent = '0 треков';
    return;
  }

  trackCountEl.textContent = `${tracks.length} ${tracks.length === 1 ? 'трек' : 'треков'}`;
  trackListEl.innerHTML = tracks.map((track, index) => `
    <div class="track-item ${currentTrackIndex === index && isPlaying ? 'playing' : ''}" data-index="${index}">
      <button class="play-btn" onclick="playTrack(${index})">
        ${currentTrackIndex === index && isPlaying ? '⏸' : '▶'}
      </button>
      <div class="track-info" onclick="playTrack(${index})">
        <div class="track-title">${escapeHtml(track.title)}</div>
        <div class="track-artist">${escapeHtml(track.artist)}</div>
      </div>
      ${currentRole === 'admin' ? `<button class="delete-btn" onclick="deleteTrack('${track.id}', ${index})">🗑 Удалить</button>` : ''}
    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function playTrack(index) {
  if (index < 0 || index >= tracks.length) return;
  const track = tracks[index];
  currentTrackIndex = index;

  if (audio.src !== `/uploads/${track.filename}`) {
    audio.src = `/uploads/${track.filename}`;
    audio.load();
  }

  audio.play().then(() => {
    isPlaying = true;
    playPauseBtn.textContent = '⏸';
    nowPlayingTitle.textContent = track.title;
    nowPlayingArtist.textContent = track.artist;
    renderTracks();
  }).catch(err => {
    console.error(err);
  });
}

playPauseBtn.addEventListener('click', () => {
  if (currentTrackIndex === -1) {
    if (tracks.length > 0) playTrack(0);
    return;
  }
  if (audio.paused) {
    audio.play().then(() => {
      isPlaying = true;
      playPauseBtn.textContent = '⏸';
      renderTracks();
    });
  } else {
    audio.pause();
    isPlaying = false;
    playPauseBtn.textContent = '▶';
    renderTracks();
  }
});

prevBtn.addEventListener('click', () => {
  if (tracks.length === 0) return;
  let idx = currentTrackIndex - 1;
  if (idx < 0) idx = tracks.length - 1;
  playTrack(idx);
});

nextBtn.addEventListener('click', () => {
  if (tracks.length === 0) return;
  let idx = currentTrackIndex + 1;
  if (idx >= tracks.length) idx = 0;
  playTrack(idx);
});

audio.addEventListener('ended', () => {
  nextBtn.click();
});

audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    progressBar.value = (audio.currentTime / audio.duration) * 100;
    currentTimeEl.textContent = formatTime(audio.currentTime);
  }
});

audio.addEventListener('loadedmetadata', () => {
  totalTimeEl.textContent = formatTime(audio.duration);
});

progressBar.addEventListener('input', () => {
  if (audio.duration) {
    audio.currentTime = (progressBar.value / 100) * audio.duration;
  }
});

volumeBar.addEventListener('input', () => {
  audio.volume = volumeBar.value / 100;
});

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

async function deleteTrack(id, index) {
  if (currentRole !== 'admin') return;
  if (!confirm('Удалить этот трек?')) return;

  const res = await fetch(`/api/tracks/${id}`, { method: 'DELETE' });
  if (res.ok) {
    if (currentTrackIndex === index) {
      audio.pause();
      isPlaying = false;
      playPauseBtn.textContent = '▶';
      currentTrackIndex = -1;
      nowPlayingTitle.textContent = 'Нет трека';
      nowPlayingArtist.textContent = '';
    }
    await loadTracks();
  }
}

uploadForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = uploadForm.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Загрузка...';

  const formData = new FormData(uploadForm);
  try {
    const res = await fetch('/api/tracks', { method: 'POST', body: formData });
    if (res.ok) {
      uploadForm.reset();
      await loadTracks();
    } else {
      const err = await res.json();
      alert('Ошибка: ' + err.error);
    }
  } catch (err) {
    alert('Ошибка загрузки');
  }
  btn.disabled = false;
  btn.textContent = 'Загрузить';
});

const importForm = document.getElementById('importForm');
const importStatus = document.createElement('div');
importStatus.style.cssText = 'font-size:13px;color:#e17055;margin-top:8px';
importForm.appendChild(importStatus);

importForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = importForm.querySelector('button');
  const input = importForm.querySelector('input');
  const urlValue = input.value.trim();

  if (!urlValue) {
    importStatus.textContent = '❌ Введите ссылку';
    importStatus.style.color = '#e74c3c';
    return;
  }

  btn.disabled = true;
  input.disabled = true;
  btn.textContent = '⏳ Скачивание...';
  importStatus.textContent = 'Идёт загрузка с YouTube. Это может занять 30-60 секунд...';

  try {
    const res = await fetch('/api/tracks/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: urlValue })
    });
    if (res.ok) {
      importForm.reset();
      importStatus.textContent = '✅ Трек импортирован!';
      importStatus.style.color = '#27ae60';
      await loadTracks();
    } else {
      const err = await res.json();
      importStatus.textContent = '❌ ' + err.error;
      importStatus.style.color = '#e74c3c';
    }
  } catch (err) {
    importStatus.textContent = '❌ Ошибка соединения с сервером';
    importStatus.style.color = '#e74c3c';
  }
  btn.disabled = false;
  input.disabled = false;
  btn.textContent = 'Импортировать';
  setTimeout(() => { importStatus.textContent = ''; importStatus.style.color = '#e17055'; }, 8000);
});

loadTracks();
</script>
</body>
</html>
